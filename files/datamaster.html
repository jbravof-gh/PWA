<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Master — IndexedDB Inspector</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{font-family:'Courier New',monospace;overflow:hidden}
:root{
  --primary:#6366f1;--primary-dim:#4338ca;--primary-glow:#818cf8;
  --bg-base:#0a0e1a;--bg-surface:#111827;--bg-card:#1e2535;--bg-hover:#252f42;
  --border:#2a3548;--border-accent:#3d4f6b;
  --text-main:#c8d4e8;--text-muted:#6b7a99;--text-bright:#e2eaf8;
  --success:#10b981;--warn:#f59e0b;--danger:#ef4444;--info:#38bdf8;
}
.app{display:flex;flex-direction:column;height:100vh;background:var(--bg-base);color:var(--text-main)}
.topbar{display:flex;align-items:center;gap:6px;padding:0 14px;height:44px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.logo{font-size:14px;font-weight:700;color:var(--primary-glow);letter-spacing:3px;margin-right:8px}
.logo-sub{font-size:10px;color:var(--text-muted);letter-spacing:.5px;margin-right:auto}
.topbar-btn{padding:4px 9px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.topbar-btn:hover{background:var(--bg-hover);color:var(--text-main);border-color:var(--border-accent)}
.topbar-btn.active{background:var(--primary-dim);color:#fff;border-color:var(--primary)}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-label{padding:6px 12px 3px;font-size:10px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 13px;font-size:12px;cursor:pointer;color:var(--text-muted);transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{background:var(--bg-hover);color:var(--text-main)}
.nav-item.active{background:var(--bg-card);color:var(--primary-glow);border-left-color:var(--primary)}
.main{flex:1;overflow:auto;background:var(--bg-base)}
.aside{width:230px;background:var(--bg-surface);border-left:1px solid var(--border);flex-shrink:0;overflow:auto}
.footer{height:28px;background:var(--bg-surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:18px;flex-shrink:0;flex-wrap:nowrap;overflow:hidden}
.footer-item{font-size:10px;color:var(--text-muted);letter-spacing:.4px;white-space:nowrap}
.footer-item span{color:var(--primary-glow)}
.panel-title{font-size:10px;color:var(--text-muted);letter-spacing:1.5px;padding:10px 12px 6px;border-bottom:1px solid var(--border);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.content-pad{padding:18px}
.section-head{font-size:10px;color:var(--text-muted);letter-spacing:1.3px;text-transform:uppercase;margin-bottom:10px}
.db-card{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:10px 13px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.db-card:hover{border-color:var(--border-accent);background:var(--bg-hover)}
.db-card.sel{border-color:var(--primary);background:#1a1f35}
.db-name{font-size:13px;color:var(--text-bright);font-weight:700;margin-bottom:2px}
.db-meta{font-size:11px;color:var(--text-muted)}
.table-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:12px;color:var(--text-muted);transition:all .15s;border-left:2px solid transparent}
.table-item:hover{background:var(--bg-hover);color:var(--text-main)}
.table-item.sel{background:var(--bg-card);color:var(--primary-glow);border-left-color:var(--primary)}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:var(--bg-card);color:var(--text-muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 11px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0}
.data-table td{padding:8px 11px;border-bottom:1px solid var(--border);color:var(--text-main);vertical-align:top;word-break:break-word;max-width:220px}
.data-table tr:hover td{background:var(--bg-hover)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;color:var(--text-muted);font-size:12px;gap:10px}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;letter-spacing:.4px;font-weight:700}
.b-blue{background:#1e3a5f;color:#38bdf8}
.b-green{background:#0d2e22;color:#10b981}
.b-purple{background:#1e1b4b;color:#818cf8}
.b-amber{background:#1c1200;color:#fbbf24}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.s-label{font-size:12px;color:var(--text-main)}
.s-desc{font-size:11px;color:var(--text-muted);margin-top:2px}
.toggle{width:38px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;outline:none}
.toggle.on{background:var(--primary)}
.toggle.off{background:var(--bg-card);border:1px solid var(--border-accent)}
.toggle::after{content:'';position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:19px}
.toggle.off::after{left:3px}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .1s;flex-shrink:0}
.swatch:hover{transform:scale(1.15)}
.swatch.sel{border-color:#fff;transform:scale(1.1)}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.btn-p{padding:7px 16px;border-radius:4px;border:none;background:var(--primary);color:#fff;font-size:12px;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-p:hover{opacity:.85}
.btn-o{padding:6px 13px;border-radius:4px;border:1px solid var(--border-accent);background:transparent;color:var(--text-main);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-o:hover{background:var(--bg-hover)}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;background:var(--bg-card);color:var(--text-muted);border:1px solid var(--border)}
.jv{color:#7dd3fc}.jk{color:#fb923c}.jn{color:#a3e635}.jb{color:#c084fc}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
input[type=text]{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;color:var(--text-main);font-family:inherit;font-size:12px;padding:6px 10px;width:100%;outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:var(--primary)}
.aside-stat{padding:10px 12px;border-bottom:1px solid var(--border)}
.ast-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.ast-val{font-size:18px;color:var(--text-bright);font-weight:700;margin-top:3px}
.progress{height:4px;background:var(--bg-card);border-radius:2px;margin-top:5px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .4s}
.alert{padding:9px 12px;border-radius:4px;font-size:11px;margin-bottom:9px;border-left:3px solid;line-height:1.6}
.a-info{background:#0c1e30;border-color:#38bdf8;color:#90cdf4}
.a-warn{background:#1c1500;border-color:#f59e0b;color:#fcd34d}
.a-success{background:#0a1f16;border-color:#10b981;color:#6ee7b7}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);margin-bottom:14px;flex-wrap:wrap}
.bc-sep{color:var(--border-accent)}
.bc-item{color:var(--primary-glow);cursor:pointer}
.bc-item:hover{text-decoration:underline}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{padding:7px 16px;font-size:11px;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.5px}
.tab:hover{color:var(--text-main)}
.tab.active{color:var(--primary-glow);border-bottom-color:var(--primary)}
.loading-wrap{display:flex;align-items:center;gap:9px;color:var(--text-muted);font-size:12px;padding:18px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.rec-card{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:9px}
.rec-field{display:flex;gap:9px;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.rec-field:last-child{border-bottom:none}
.fk{color:#fb923c;min-width:110px;flex-shrink:0;word-break:break-all}
.fv{color:var(--text-main);word-break:break-all}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:11px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);margin:2px;cursor:default}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}
.explorer-wrap{display:flex;height:100%}
.db-list-panel{width:210px;border-right:1px solid var(--border);flex-shrink:0;overflow:auto;display:flex;flex-direction:column}
.db-list-scroll{flex:1;overflow:auto;padding:8px}
.main-content{flex:1;overflow:auto;padding:18px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

const COLORS = [
  {name:'Indigo',   id:'indigo',  p:'#6366f1',dim:'#4338ca',glow:'#818cf8'},
  {name:'Azul',     id:'blue',    p:'#3b82f6',dim:'#1d4ed8',glow:'#60a5fa'},
  {name:'Esmeralda',id:'emerald', p:'#10b981',dim:'#059669',glow:'#34d399'},
  {name:'Rosa',     id:'rose',    p:'#f43f5e',dim:'#be123c',glow:'#fb7185'},
  {name:'Ámbar',    id:'amber',   p:'#f59e0b',dim:'#b45309',glow:'#fbbf24'},
  {name:'Violeta',  id:'violet',  p:'#8b5cf6',dim:'#6d28d9',glow:'#a78bfa'},
  {name:'Cian',     id:'cyan',    p:'#06b6d4',dim:'#0e7490',glow:'#22d3ee'},
  {name:'Naranja',  id:'orange',  p:'#f97316',dim:'#c2410c',glow:'#fb923c'},
];

function applyTheme(prefs) {
  const c = COLORS.find(x => x.id === prefs.color) || COLORS[0];
  const r = document.documentElement.style;
  r.setProperty('--primary', c.p);
  r.setProperty('--primary-dim', c.dim);
  r.setProperty('--primary-glow', c.glow);
  if (prefs.darkMode) {
    r.setProperty('--bg-base','#0a0e1a'); r.setProperty('--bg-surface','#111827');
    r.setProperty('--bg-card','#1e2535'); r.setProperty('--bg-hover','#252f42');
    r.setProperty('--border','#2a3548'); r.setProperty('--border-accent','#3d4f6b');
    r.setProperty('--text-main','#c8d4e8'); r.setProperty('--text-muted','#6b7a99');
    r.setProperty('--text-bright','#e2eaf8');
    document.body.style.background='#0a0e1a'; document.body.style.color='#c8d4e8';
  } else {
    r.setProperty('--bg-base','#f0f4f8'); r.setProperty('--bg-surface','#ffffff');
    r.setProperty('--bg-card','#f1f5f9'); r.setProperty('--bg-hover','#e2e8f0');
    r.setProperty('--border','#cbd5e1'); r.setProperty('--border-accent','#94a3b8');
    r.setProperty('--text-main','#1e293b'); r.setProperty('--text-muted','#64748b');
    r.setProperty('--text-bright','#0f172a');
    document.body.style.background='#f0f4f8'; document.body.style.color='#1e293b';
  }
}

const PREF_KEY = 'dbmaster_v1';
const loadPrefs = () => { try { return JSON.parse(localStorage.getItem(PREF_KEY)) || {}; } catch { return {}; }};
const savePrefs = p => localStorage.setItem(PREF_KEY, JSON.stringify(p));

async function listDatabases() {
  try {
    if (window.indexedDB && window.indexedDB.databases) {
      const dbs = await window.indexedDB.databases();
      return dbs.filter(d => d.name).map(d => ({name: d.name, version: d.version || 1}));
    }
    return [];
  } catch { return []; }
}

function openDB(dbName, version) {
  return new Promise((res, rej) => {
    const req = indexedDB.open(dbName, version);
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => rej(new Error('No se pudo abrir ' + dbName));
  });
}

async function getStores(dbName) {
  try {
    const db = await openDB(dbName);
    const stores = [...db.objectStoreNames];
    db.close();
    return stores;
  } catch { return []; }
}

async function getRecords(dbName, storeName, limit = 200) {
  return new Promise(res => {
    const req = indexedDB.open(dbName);
    req.onsuccess = e => {
      const db = e.target.result;
      try {
        const tx = db.transaction(storeName, 'readonly');
        const store = tx.objectStore(storeName);
        const all = store.getAll();
        all.onsuccess = () => { db.close(); res(all.result.slice(0, limit)); };
        all.onerror = () => { db.close(); res([]); };
      } catch { db.close(); res([]); }
    };
    req.onerror = () => res([]);
  });
}

async function createSampleDB() {
  return new Promise(res => {
    const req = indexedDB.open('SampleDB', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('users')) {
        const u = db.createObjectStore('users', {keyPath:'id', autoIncrement:true});
        u.createIndex('email', 'email', {unique:true});
      }
      if (!db.objectStoreNames.contains('products')) {
        const p = db.createObjectStore('products', {keyPath:'id', autoIncrement:true});
        p.createIndex('category', 'category', {unique:false});
      }
      if (!db.objectStoreNames.contains('orders')) {
        db.createObjectStore('orders', {keyPath:'id', autoIncrement:true});
      }
    };
    req.onsuccess = e => {
      const db = e.target.result;
      const tx = db.transaction(['users','products','orders'], 'readwrite');
      const uStore = tx.objectStore('users');
      const pStore = tx.objectStore('products');
      const oStore = tx.objectStore('orders');
      [
        {name:'Alice Johnson',  email:'alice@example.com',  role:'admin',  active:true,  score:95},
        {name:'Bob Martínez',   email:'bob@example.com',    role:'user',   active:true,  score:72},
        {name:'Carol Nguyen',   email:'carol@example.com',  role:'editor', active:false, score:88},
        {name:'David Kowalski', email:'david@example.com',  role:'user',   active:true,  score:61},
      ].forEach(u => { try{uStore.add(u);}catch{} });
      [
        {name:'Widget Pro',   price:29.99,  category:'gadgets',  stock:142, rating:4.5},
        {name:'DataKit',      price:9.99,   category:'software', stock:999, rating:4.8},
        {name:'NanoBoard',    price:149.00, category:'hardware', stock:23,  rating:4.2},
        {name:'CloudSync',    price:19.99,  category:'software', stock:500, rating:4.6},
      ].forEach(p => { try{pStore.add(p);}catch{} });
      [
        {userId:1, productId:3, qty:1, total:149.00, status:'shipped'},
        {userId:2, productId:1, qty:2, total:59.98,  status:'pending'},
        {userId:3, productId:2, qty:1, total:9.99,   status:'delivered'},
      ].forEach(o => { try{oStore.add(o);}catch{} });
      tx.oncomplete = () => { db.close(); res(); };
      tx.onerror = () => { db.close(); res(); };
    };
  });
}

function JsonVal({val}) {
  if (val === null || val === undefined) return <span style={{color:'#94a3b8'}}>null</span>;
  if (typeof val === 'boolean') return <span className="jb">{String(val)}</span>;
  if (typeof val === 'number')  return <span className="jn">{val}</span>;
  if (typeof val === 'string')  return <span className="jv">"{val.length>100 ? val.slice(0,100)+'…' : val}"</span>;
  if (Array.isArray(val))       return <span style={{color:'#94a3b8'}}>[…{val.length} items]</span>;
  if (typeof val === 'object')  return <span style={{color:'#94a3b8'}}>{`{…${Object.keys(val).length} keys}`}</span>;
  return <span>{String(val)}</span>;
}

function RecordViewer({records, viewMode}) {
  if (!records.length) return <div className="empty"><span style={{fontSize:18}}>◻</span><span>Sin registros en esta tabla</span></div>;
  if (viewMode === 'cards') return (
    <div>
      {records.map((rec,i) => (
        <div className="rec-card" key={i}>
          <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8,letterSpacing:1}}>REGISTRO #{i+1}</div>
          {Object.entries(rec).map(([k,v]) => (
            <div className="rec-field" key={k}>
              <span className="fk">{k}</span>
              <span className="fv"><JsonVal val={v}/></span>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
  const cols = [...new Set(records.flatMap(r => Object.keys(r)))].slice(0, 9);
  return (
    <div style={{overflowX:'auto'}}>
      <table className="data-table">
        <thead><tr>{cols.map(c => <th key={c}>{c}</th>)}</tr></thead>
        <tbody>
          {records.map((rec,i) => (
            <tr key={i}>{cols.map(c => <td key={c}><JsonVal val={rec[c] ?? null}/></td>)}</tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function DatabaseExplorer({onSelectDb, onSelectStore, selectedDb, selectedStore}) {
  const [dbs, setDbs] = useState(null);
  const [stores, setStores] = useState([]);
  const [records, setRecords] = useState(null);
  const [loading, setLoading] = useState(false);
  const [viewMode, setViewMode] = useState('table');
  const [tab, setTab] = useState('data');
  const [search, setSearch] = useState('');
  const [creating, setCreating] = useState(false);

  const refresh = useCallback(async () => {
    setLoading(true);
    const list = await listDatabases();
    setDbs(list);
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, []);

  useEffect(() => {
    if (selectedDb) {
      getStores(selectedDb).then(s => { setStores(s); setRecords(null); setTab('data'); });
    } else {
      setStores([]);
    }
  }, [selectedDb]);

  useEffect(() => {
    if (selectedDb && selectedStore) {
      setLoading(true);
      setRecords(null);
      getRecords(selectedDb, selectedStore).then(r => { setRecords(r); setLoading(false); });
    }
  }, [selectedDb, selectedStore]);

  const handleCreateSample = async () => {
    setCreating(true);
    await createSampleDB();
    await refresh();
    setCreating(false);
  };

  const filtered = (records || []).filter(r =>
    !search || JSON.stringify(r).toLowerCase().includes(search.toLowerCase())
  );

  const cols = records && records.length > 0 ? [...new Set(records.flatMap(r => Object.keys(r)))] : [];

  return (
    <div className="explorer-wrap">
      {/* DB list panel */}
      <div className="db-list-panel">
        <div className="panel-title">
          <span>Bases de datos</span>
          <button onClick={refresh} title="Refrescar"
            style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:16,lineHeight:1}}>
            ↻
          </button>
        </div>
        <div className="db-list-scroll">
          {loading && !dbs && <div className="loading-wrap"><div className="spinner"/>Buscando…</div>}
          {dbs && dbs.length === 0 && (
            <div style={{padding:'10px 4px'}}>
              <div className="alert a-warn">No se encontraron bases de datos IndexedDB en este origen.</div>
              <button className="btn-p" style={{width:'100%',fontSize:11}} onClick={handleCreateSample} disabled={creating}>
                {creating ? '⟳ Creando…' : '+ Crear SampleDB'}
              </button>
            </div>
          )}
          {dbs && dbs.map(db => (
            <div className={`db-card ${selectedDb===db.name?'sel':''}`} key={db.name}
              style={{margin:'0 0 6px 0',padding:'9px 11px'}}
              onClick={() => { onSelectDb(db.name); onSelectStore(null); }}>
              <div className="db-name" style={{fontSize:12}}>{db.name}</div>
              <div className="db-meta">versión {db.version}</div>
            </div>
          ))}
        </div>
        {selectedDb && stores.length > 0 && (
          <div style={{borderTop:'1px solid var(--border)',paddingTop:4}}>
            <div className="sidebar-label">Tablas ({stores.length})</div>
            {stores.map(s => (
              <div className={`table-item ${selectedStore===s?'sel':''}`} key={s}
                onClick={() => onSelectStore(s)}>
                <span style={{fontSize:10,color:'var(--primary-glow)'}}>▸</span>
                <span>{s}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Main content */}
      <div className="main-content">
        {/* Welcome screen */}
        {!selectedDb && (
          <div style={{maxWidth:520}}>
            <div style={{fontSize:24,color:'var(--primary-glow)',marginBottom:6,letterSpacing:3,fontWeight:700}}>
              DB▸MASTER
            </div>
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:18,lineHeight:1.8}}>
              Inspector de bases de datos IndexedDB del navegador. Selecciona una base de datos del panel izquierdo para explorar sus tablas y registros.
            </div>
            <div className="alert a-info" style={{marginBottom:10}}>
              <strong>Nota:</strong> IndexedDB está aislado por origen. Solo verás las bases de datos de este dominio.
            </div>
            {dbs && dbs.length > 0 && (
              <div style={{marginTop:16}}>
                <div className="section-head">Bases de datos encontradas</div>
                <div className="grid-2">
                  {dbs.map(db => (
                    <div className="db-card" key={db.name}
                      onClick={() => { onSelectDb(db.name); onSelectStore(null); }}
                      style={{display:'flex',flexDirection:'column',gap:6}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                        <div className="db-name">{db.name}</div>
                        <span className="badge b-blue">IDB</span>
                      </div>
                      <div className="db-meta">versión {db.version}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {dbs && dbs.length === 0 && (
              <div style={{marginTop:16}}>
                <div className="section-head">Sin datos</div>
                <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:10,lineHeight:1.7}}>
                  No hay bases de datos en este origen. Puedes crear una de demostración con datos de ejemplo.
                </div>
                <button className="btn-p" onClick={handleCreateSample} disabled={creating}>
                  {creating ? '⟳ Creando SampleDB…' : '+ Crear SampleDB de ejemplo'}
                </button>
              </div>
            )}
          </div>
        )}

        {/* DB selected, no table */}
        {selectedDb && !selectedStore && (
          <div>
            <div className="breadcrumb">
              <span className="bc-item" onClick={() => { onSelectDb(null); onSelectStore(null); }}>inicio</span>
              <span className="bc-sep">›</span>
              <span style={{color:'var(--text-bright)'}}>{selectedDb}</span>
            </div>
            <div style={{fontSize:16,color:'var(--text-bright)',marginBottom:14,fontWeight:700}}>
              {selectedDb}
              <span className="badge b-blue" style={{marginLeft:10,fontWeight:400,fontSize:11}}>IndexedDB</span>
            </div>
            <div className="section-head">Object Stores ({stores.length})</div>
            <div className="grid-2">
              {stores.map(s => (
                <div className="db-card" key={s} onClick={() => onSelectStore(s)}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <div style={{fontSize:13,color:'var(--text-bright)',fontWeight:700}}>{s}</div>
                    <span className="badge b-purple">STORE</span>
                  </div>
                  <div className="db-meta">Object Store · click para explorar</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Table selected */}
        {selectedDb && selectedStore && (
          <div>
            <div className="breadcrumb">
              <span className="bc-item" onClick={() => { onSelectDb(null); onSelectStore(null); }}>inicio</span>
              <span className="bc-sep">›</span>
              <span className="bc-item" onClick={() => onSelectStore(null)}>{selectedDb}</span>
              <span className="bc-sep">›</span>
              <span style={{color:'var(--text-bright)'}}>{selectedStore}</span>
            </div>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div>
                <div style={{fontSize:15,color:'var(--text-bright)',fontWeight:700}}>{selectedStore}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>en {selectedDb}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className={`topbar-btn ${viewMode==='table'?'active':''}`} onClick={() => setViewMode('table')}>▤ Tabla</button>
                <button className={`topbar-btn ${viewMode==='cards'?'active':''}`} onClick={() => setViewMode('cards')}>▦ Tarjetas</button>
              </div>
            </div>

            <div className="tabs">
              {['data','schema','info'].map(t => (
                <div key={t} className={`tab ${tab===t?'active':''}`} onClick={() => setTab(t)}>
                  {t.toUpperCase()}
                </div>
              ))}
            </div>

            {tab === 'data' && (
              <>
                <div style={{marginBottom:10}}>
                  <input type="text" placeholder="Buscar en registros…" value={search}
                    onChange={e => setSearch(e.target.value)}/>
                </div>
                {loading && <div className="loading-wrap"><div className="spinner"/>Cargando registros…</div>}
                {!loading && records !== null && (
                  <div>
                    <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:10,letterSpacing:.5}}>
                      {filtered.length} registro{filtered.length !== 1 ? 's' : ''}
                      {search ? ` que coinciden con "${search}"` : ''}
                      {records.length >= 200 ? ' (límite 200)' : ''}
                    </div>
                    <RecordViewer records={filtered} viewMode={viewMode}/>
                  </div>
                )}
              </>
            )}

            {tab === 'schema' && (
              <div>
                {records && records.length > 0 ? (
                  <div>
                    <div className="section-head">Campos detectados ({cols.length})</div>
                    {cols.map(k => {
                      const types = [...new Set(records.map(r => typeof r[k]).filter(Boolean))];
                      const sample = records.find(r => r[k] !== null && r[k] !== undefined);
                      return (
                        <div className="settings-row" key={k} style={{padding:'9px 0'}}>
                          <div style={{display:'flex',flexDirection:'column',gap:3}}>
                            <span className="fk">{k}</span>
                          </div>
                          <div style={{display:'flex',gap:4,alignItems:'center'}}>
                            {types.map(t => <span key={t} className="tag">{t}</span>)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ) : <div className="empty"><span>Carga los datos primero</span></div>}
              </div>
            )}

            {tab === 'info' && (
              <div style={{fontSize:12}}>
                <div className="settings-row"><span style={{color:'var(--text-muted)'}}>Base de datos</span><span style={{color:'var(--primary-glow)'}}>{selectedDb}</span></div>
                <div className="settings-row"><span style={{color:'var(--text-muted)'}}>Object Store</span><span style={{color:'var(--primary-glow)'}}>{selectedStore}</span></div>
                <div className="settings-row"><span style={{color:'var(--text-muted)'}}>Registros cargados</span><span style={{color:'var(--text-bright)',fontWeight:700}}>{records?.length ?? '—'}</span></div>
                <div className="settings-row"><span style={{color:'var(--text-muted)'}}>Campos detectados</span><span style={{color:'var(--text-bright)'}}>{cols.length}</span></div>
                <div className="settings-row"><span style={{color:'var(--text-muted)'}}>Límite por consulta</span><span className="tag">200 registros</span></div>
                <div className="settings-row"><span style={{color:'var(--text-muted)'}}>Motor</span><span className="badge b-blue">IndexedDB</span></div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function SettingsView({prefs, onChange, onRefresh}) {
  return (
    <div className="content-pad" style={{maxWidth:580}}>
      <div style={{fontSize:18,color:'var(--text-bright)',marginBottom:4,fontWeight:700,letterSpacing:2}}>AJUSTES</div>
      <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:22,lineHeight:1.7}}>
        Personaliza la apariencia de la interfaz. Los cambios se guardan automáticamente.
      </div>

      <div style={{marginBottom:22}}>
        <div className="section-head">Apariencia</div>
        <div className="settings-row">
          <div>
            <div className="s-label">Modo oscuro</div>
            <div className="s-desc">Activa el tema oscuro de la aplicación</div>
          </div>
          <button className={`toggle ${prefs.darkMode?'on':'off'}`}
            onClick={() => onChange({darkMode: !prefs.darkMode})}/>
        </div>
        <div style={{paddingTop:12}}>
          <div className="s-label" style={{marginBottom:6}}>Color primario</div>
          <div className="color-row">
            {COLORS.map(c => (
              <div key={c.id} className={`swatch ${prefs.color===c.id?'sel':''}`}
                style={{background:c.p}} title={c.name}
                onClick={() => onChange({color: c.id})}/>
            ))}
          </div>
          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8}}>
            Seleccionado: <span style={{color:'var(--primary-glow)'}}>{COLORS.find(c=>c.id===prefs.color)?.name}</span>
          </div>
        </div>
      </div>

      <hr className="divider"/>

      <div style={{marginBottom:22}}>
        <div className="section-head">Paneles visibles</div>
        {[
          {key:'showHeader', label:'Header', desc:'Barra superior con controles de navegación y tema'},
          {key:'showFooter', label:'Footer', desc:'Barra inferior con información de estado'},
          {key:'showSidebar',label:'Sidebar',desc:'Panel de navegación izquierdo con menú y filtros'},
          {key:'showAside', label:'Aside',  desc:'Panel derecho con estadísticas e información'},
        ].map(({key,label,desc}) => (
          <div className="settings-row" key={key}>
            <div>
              <div className="s-label">{label}</div>
              <div className="s-desc">{desc}</div>
            </div>
            <button className={`toggle ${prefs[key]?'on':'off'}`}
              onClick={() => onChange({[key]: !prefs[key]})}/>
          </div>
        ))}
      </div>

      <hr className="divider"/>

      <div>
        <div className="section-head">Datos de prueba</div>
        <div className="alert a-info" style={{marginBottom:12}}>
          Crea la base de datos <strong>SampleDB</strong> con tablas de usuarios, productos y pedidos con datos de ejemplo.
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn-p" onClick={async () => {
            await createSampleDB();
            onRefresh();
            alert('✓ SampleDB creada. Navega al Explorador para verla.');
          }}>
            + Crear / resetear SampleDB
          </button>
        </div>
      </div>
    </div>
  );
}

function AsidePanel({selectedDb, selectedStore, records}) {
  const now = new Date();
  const time = now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  const date = now.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
  return (
    <div>
      <div className="panel-title">Información</div>
      <div className="aside-stat">
        <div className="ast-label">Estado</div>
        <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'var(--success)',display:'inline-block'}}/>
          <span style={{fontSize:12,color:'var(--text-main)'}}>Activo</span>
        </div>
      </div>

      {selectedDb ? (
        <>
          <div className="aside-stat">
            <div className="ast-label">DB activa</div>
            <div style={{fontSize:12,color:'var(--primary-glow)',marginTop:3,wordBreak:'break-all',lineHeight:1.4}}>{selectedDb}</div>
          </div>
          {selectedStore && (
            <div className="aside-stat">
              <div className="ast-label">Tabla</div>
              <div style={{fontSize:13,color:'var(--text-bright)',marginTop:3,fontWeight:600}}>{selectedStore}</div>
            </div>
          )}
          {records !== null && (
            <div className="aside-stat">
              <div className="ast-label">Registros</div>
              <div className="ast-val">{records.length}</div>
              <div className="progress">
                <div className="progress-fill" style={{width:`${Math.min(records.length / 2, 100)}%`}}/>
              </div>
            </div>
          )}
        </>
      ) : (
        <div style={{padding:'12px',fontSize:11,color:'var(--text-muted)',lineHeight:1.7}}>
          Selecciona una base de datos en el explorador para ver estadísticas aquí.
        </div>
      )}

      <div className="aside-stat">
        <div className="ast-label">Motor</div>
        <div style={{marginTop:4}}><span className="badge b-blue">IndexedDB</span></div>
      </div>
      <div className="aside-stat">
        <div className="ast-label">Sesión</div>
        <div style={{fontSize:12,color:'var(--text-main)',marginTop:3}}>{date} · {time}</div>
      </div>

      <div style={{padding:'10px 12px'}}>
        <div style={{fontSize:10,color:'var(--text-muted)',letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Info del navegador</div>
        <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.8}}>
          <div>Motor: <span style={{color:'var(--text-main)'}}>{navigator.userAgent.includes('Firefox')?'Gecko':navigator.userAgent.includes('Safari')&&!navigator.userAgent.includes('Chrome')?'WebKit':'Blink'}</span></div>
          <div>IDB API: <span style={{color:'var(--success)'}}>✓ disponible</span></div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const saved = loadPrefs();
  const [prefs, setPrefsState] = useState({
    showHeader:true, showFooter:true, showSidebar:true, showAside:true,
    darkMode:true, color:'indigo',
    ...saved,
  });
  const [view, setView] = useState('explorer');
  const [selectedDb, setSelectedDb] = useState(null);
  const [selectedStore, setSelectedStore] = useState(null);
  const [records, setRecords] = useState(null);
  const [refreshKey, setRefreshKey] = useState(0);

  const setPrefs = useCallback(patch => {
    setPrefsState(p => {
      const n = {...p, ...patch};
      savePrefs(n);
      applyTheme(n);
      return n;
    });
  }, []);

  useEffect(() => { applyTheme(prefs); }, []);

  useEffect(() => {
    if (selectedDb && selectedStore) {
      setRecords(null);
      getRecords(selectedDb, selectedStore).then(r => setRecords(r));
    }
  }, [selectedDb, selectedStore]);

  const navItems = [
    {id:'explorer', label:'Explorador', icon:'▦'},
    {id:'settings', label:'Ajustes',    icon:'⚙'},
  ];

  return (
    <div className="app">
      {prefs.showHeader && (
        <div className="topbar">
          <span className="logo">DB▸MASTER</span>
          <span className="logo-sub">IndexedDB Inspector</span>
          <div style={{display:'flex',gap:4,flexWrap:'nowrap'}}>
            {[
              {k:'showHeader', l:'Header'},
              {k:'showFooter', l:'Footer'},
              {k:'showSidebar',l:'Sidebar'},
              {k:'showAside',  l:'Aside'},
            ].map(({k,l}) => (
              <button key={k} className={`topbar-btn ${prefs[k]?'active':''}`}
                onClick={() => setPrefs({[k]:!prefs[k]})}>
                {l}
              </button>
            ))}
            <button className="topbar-btn"
              onClick={() => setPrefs({darkMode:!prefs.darkMode})}
              title={prefs.darkMode?'Modo claro':'Modo oscuro'}>
              {prefs.darkMode ? '☽ Dark' : '☀ Light'}
            </button>
          </div>
        </div>
      )}

      <div className="body">
        {prefs.showSidebar && (
          <div className="sidebar">
            <div style={{padding:'10px 0 4px'}}>
              <div className="sidebar-label">Navegación</div>
              {navItems.map(n => (
                <div key={n.id} className={`nav-item ${view===n.id?'active':''}`}
                  onClick={() => setView(n.id)}>
                  <span style={{fontSize:14}}>{n.icon}</span>
                  <span>{n.label}</span>
                </div>
              ))}
            </div>

            {view === 'explorer' && selectedDb && (
              <div style={{borderTop:'1px solid var(--border)',paddingTop:8,marginTop:4}}>
                <div className="sidebar-label">Contexto actual</div>
                <div style={{padding:'6px 13px',fontSize:11,lineHeight:1.8}}>
                  <div style={{color:'var(--text-muted)'}}>DB: <span style={{color:'var(--primary-glow)'}}>{selectedDb}</span></div>
                  {selectedStore && <div style={{color:'var(--text-muted)'}}>Tabla: <span style={{color:'var(--text-main)'}}>{selectedStore}</span></div>}
                  {records !== null && <div style={{color:'var(--text-muted)'}}>Filas: <span style={{color:'var(--text-bright)',fontWeight:700}}>{records.length}</span></div>}
                </div>
              </div>
            )}

            <div style={{marginTop:'auto',padding:'10px 12px',borderTop:'1px solid var(--border)'}}>
              <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:8}}>Color primario</div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {COLORS.map(c => (
                  <div key={c.id}
                    style={{width:16,height:16,borderRadius:'50%',background:c.p,cursor:'pointer',
                      border:prefs.color===c.id?'2px solid var(--text-bright)':'2px solid transparent',
                      transition:'border-color .15s,transform .1s'}}
                    title={c.name}
                    onClick={() => setPrefs({color:c.id})}/>
                ))}
              </div>
              <div style={{fontSize:10,color:'var(--text-muted)',marginTop:8}}>
                v1.0.0 · {prefs.darkMode?'Dark':'Light'}
              </div>
            </div>
          </div>
        )}

        <div className="main">
          {view === 'explorer' && (
            <DatabaseExplorer
              key={refreshKey}
              onSelectDb={db => { setSelectedDb(db); setSelectedStore(null); setRecords(null); }}
              onSelectStore={s => setSelectedStore(s)}
              selectedDb={selectedDb}
              selectedStore={selectedStore}
            />
          )}
          {view === 'settings' && (
            <SettingsView prefs={prefs} onChange={setPrefs}
              onRefresh={() => { setRefreshKey(k => k+1); setView('explorer'); }}/>
          )}
        </div>

        {prefs.showAside && (
          <div className="aside">
            <AsidePanel selectedDb={selectedDb} selectedStore={selectedStore} records={records}/>
          </div>
        )}
      </div>

      {prefs.showFooter && (
        <div className="footer">
          <div className="footer-item">Motor: <span>IndexedDB</span></div>
          <div className="footer-item">Estado: <span style={{color:'var(--success)'}}>● Activo</span></div>
          <div className="footer-item">DB: <span>{selectedDb||'—'}</span></div>
          <div className="footer-item">Tabla: <span>{selectedStore||'—'}</span></div>
          <div className="footer-item" style={{marginLeft:'auto'}}>
            Tema: <span>{COLORS.find(c=>c.id===prefs.color)?.name} · {prefs.darkMode?'Oscuro':'Claro'}</span>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
